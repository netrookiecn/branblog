  <line x1="380" y1="412" x2="380" y2="460" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="795" y1="60" x2="795" y2="545" stroke="#4a4a4a" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="800" y="300" font-family="system-ui,sans-serif" font-size="36" fill="#9dd4c7" text-anchor="middle">→</text>
  <rect x="900" y="68" width="640" height="46" rx="8" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2"/>
  <text x="1220" y="98" font-family="system-ui,sans-serif" font-size="18" font-weight="600" fill="#1a1a1a" text-anchor="middle">新范式：感知即推理，视觉即行动</text>
