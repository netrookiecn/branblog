  <text x="380" y="392" font-family="system-ui,sans-serif" font-size="17" fill="#1a1a1a" text-anchor="middle">LLM（主角）</text>
  <rect x="130" y="470" width="500" height="52" rx="6" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2"/>
  <text x="380" y="502" font-family="system-ui,sans-serif" font-size="17" fill="#1a1a1a" text-anchor="middle">回答问题 / 输出文字</text>
