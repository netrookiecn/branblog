<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 580">
  <rect width="1600" height="580" fill="#f8f6f3"/>
  <defs><marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#5a5a5a"/></marker></defs>
  <text x="800" y="44" font-family="system-ui,sans-serif" font-size="26" font-weight="600" fill="#1a1a1a" text-anchor="middle">旧范式 vs 原生多模态 Agent 范式</text>
  <rect x="60" y="68" width="640" height="46" rx="8" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2"/>
  <text x="380" y="98" font-family="system-ui,sans-serif" font-size="18" font-weight="600" fill="#6a6a6a" text-anchor="middle">旧范式：视觉作为辅助输入</text>
  <rect x="130" y="140" width="500" height="52" rx="6" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2"/>
